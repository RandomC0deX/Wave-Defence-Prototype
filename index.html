<!DOCTYPE html>
<html>
<head>
    <title>WAVE DEFENCE PROTOTYPE</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #1a1a2e;
            font-family: Arial, sans-serif;
        }
        #stats {
            position: fixed;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 5px;
            z-index: 100;
        }
        #debug {
            position: fixed;
            top: 10px;
            right: 10px;
            color: #0f0;
            background: rgba(0,0,0,0.8);
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
            z-index: 100;
            max-width: 300px;
            white-space: pre-wrap;
            display: none;
        }
        #fps {
            position: fixed;
            bottom: 10px;
            left: 10px;
            color: #0f0;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 14px;
            z-index: 100;
        }
        #gameCanvas {
            display: block;
        }
    </style>
</head>
<body>
    <div id="stats">Connecting...</div>
    <div id="debug">Debug console</div>
    <div id="fps">FPS: 0</div>
    
    <!-- Chat Container -->
    <div id="chatContainer" style="
        position: fixed;
        bottom: 10px;
        right: 10px;
        width: 300px;
        height: 200px;
        background: rgba(0,0,0,0.1);
        border: 1px solid #444;
        border-radius: 5px;
        display: flex;
        flex-direction: column;
        z-index: 1000;
    ">
        <div id="chatMessages" style="
            flex-grow: 1;
            overflow-y: auto;
            padding: 5px;
            color: white;
            font-family: monospace;
            font-size: 12px;
            display: flex;
            flex-direction: column-reverse;
        "></div>
        <div style="display: flex; border-top: 1px solid #444;">
            <input type="text" id="chatInput" placeholder="Type message..." style="
                flex-grow: 1;
                background: rgba(255,255,255,0.1);
                border: none;
                color: white;
                padding: 8px;
                outline: none;
                font-family: monospace;
            ">
            <button id="chatSend" style="
                background: #4CAF50;
                border: none;
                color: white;
                padding: 8px 15px;
                cursor: pointer;
                font-family: monospace;
            ">Send</button>
        </div>
    </div>
    
    <canvas id="gameCanvas"></canvas>

    <script>
        // Canvas setup
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        canvas.setAttribute('tabindex', '0');
        canvas.style.outline = 'none';
        canvas.focus();

        // Game state
        const ws = new WebSocket('wss://wave-defence-prototype.onrender.com');
        let players = {};
        let myId = null;
        let keys = {};
        let debugInfo = [];
        let lastPlayerCount = 0;
        let debugVisible = false;

        // Movement
        const SPEED = 2;
        let myX = 400, myY = 300;

        // Camera
        let cameraX = 0, cameraY = 0;
        let targetCameraX = 400, targetCameraY = 300;
        const CAMERA_SMOOTH = 0.1;
        let lastTime = performance.now();

        // World boundaries
        const WORLD_WIDTH = 2000;
        const WORLD_HEIGHT = 2000;
        const VOID_COLOR = 'rgba(30, 30, 40, 0.95)';
        const GRID_COLOR = '#2a2a3e';

        // Chat
        let chatMessages = [];
        const MAX_CHAT_MESSAGES = 50;

        // Bullet system
        const BULLET_SPEED = 5;
        const BULLET_SIZE = 5;
        let bullets = [];
        let lastShotTime = 0;
        const SHOT_COOLDOWN = 1000;
        let isMouseDown = false;
        let autoFireInterval = null;
        const AUTO_FIRE_RATE = 500;

        // FPS counter
        let frameCount = 0;
        let lastFpsUpdate = performance.now();
        let fps = 0;

        function debug(...args) {
            const msg = args.join(' ');
            debugInfo.unshift(msg);
            if (debugInfo.length > 8) debugInfo.pop();
            document.getElementById('debug').innerHTML = debugInfo.join('<br>');
            console.log(...args);
        }

        // WebSocket handlers
        ws.onopen = () => {
            debug('✅ Connected');
            document.getElementById('stats').innerHTML = '✅ Connected';
            ws.send(JSON.stringify({type: 'hello'}));
            
            document.getElementById('chatSend').addEventListener('click', sendChatMessage);
            document.getElementById('chatInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendChatMessage();
            });
        };

        ws.onmessage = (event) => {
            console.log('🔵 RAW MESSAGE RECEIVED:', event.data);
            try {
                const data = JSON.parse(event.data);
                const chatDiv = document.getElementById('chatMessages');
                
                if (data.type === 'init') {
                    myId = data.id;
                    debug('✅ Got ID:', myId);
                    document.getElementById('stats').innerHTML = `Player ${myId}`;
                }
                
                if (data.type === 'update') {
                    players = data.players || {};
                    
                    if (myId && players[myId]) {
                        delete players[myId];
                    }
                    
                    const currentCount = Object.keys(players).length + (myId ? 1 : 0);
                    
                    if (currentCount !== lastPlayerCount) {
                        if (currentCount > lastPlayerCount) {
                            debug(`➕ Player joined! Total: ${currentCount}`);
                            const systemMsg = `🏷️ Player joined! Total: ${currentCount}`;
                            chatMessages.unshift(`<span style="color: #4CAF50;">${systemMsg}</span>`);
                        } else if (currentCount < lastPlayerCount) {
                            debug(`➖ Player left. Total: ${currentCount}`);
                            const systemMsg = `👋 Player left. Total: ${currentCount}`;
                            chatMessages.unshift(`<span style="color: #ff4444;">${systemMsg}</span>`);
                        }
                        
                        if (chatMessages.length > MAX_CHAT_MESSAGES) chatMessages.pop();
                        chatDiv.innerHTML = chatMessages.map(msg => 
                            `<div style="margin: 2px 0;">${msg}</div>`
                        ).join('');
                        
                        lastPlayerCount = currentCount;
                    }
                }
                
                if (data.type === 'chat') {
                    console.log('📨 Chat received from player', data.playerId, ':', data.message);
                    
                    const message = `[P${data.playerId}]: ${data.message}`;
                    chatMessages.unshift(message);
                    
                    if (chatMessages.length > MAX_CHAT_MESSAGES) chatMessages.pop();
                    
                    const chatDisplay = document.getElementById('chatMessages');
                    if (chatDisplay) {
                        chatDisplay.innerHTML = chatMessages.map(msg => 
                            `<div style="color: white; margin: 2px 0;">${msg}</div>`
                        ).join('');
                    }
                }
                
                if (data.type === 'bullet') {
                    if (data.bullet.owner !== myId) {
                        bullets.push(data.bullet);
                    }
                }
                
            } catch (e) {
                debug('❌ Error:', e.message);
            }
        };

        ws.onclose = () => {
            debug('❌ Disconnected');
            document.getElementById('stats').innerHTML = '❌ Disconnected';
        };

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            // Chat input handling
            if (document.activeElement === document.getElementById('chatInput')) {
                if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
                    e.preventDefault(); 
                }
                return;
            }
            
            // Movement keys
            keys[e.key] = true;
            if (['w','a','s','d','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
                e.preventDefault();
            }
            
            // Debug toggle
            if (e.code === 'Backquote') {
                e.preventDefault();
                debugVisible = !debugVisible;
                document.getElementById('debug').style.display = debugVisible ? 'block' : 'none';
                if (debugVisible) debug('🔧 Debug mode ON');
            }
        });

        document.addEventListener('keyup', (e) => {
            if (document.activeElement === document.getElementById('chatInput')) return;
            keys[e.key] = false;
        });
        
        //Shooting Tech
        canvas.addEventListener('mousedown', (e) => {
            e.preventDefault();
            e.stopPropagation();
            if (!myId || ws.readyState !== WebSocket.OPEN) return;
            isMouseDown = true;
            
            // Shoot immediately on click
            shootBullet(e);
            
            // Set up interval for continuous firing
            if (autoFireInterval) clearInterval(autoFireInterval);
            autoFireInterval = setInterval(() => {
                if (isMouseDown && myId && ws.readyState === WebSocket.OPEN) {
                    // Create a synthetic event with current mouse position
                    const fakeEvent = {
                        clientX: lastMouseX,
                        clientY: lastMouseY,
                        preventDefault: () => {}
                    };
                    shootBullet(fakeEvent);
                }
            }, AUTO_FIRE_RATE);
        });

        // Mouse up - stop auto-fire
        canvas.addEventListener('mouseup', () => {
            isMouseDown = false;
            if (autoFireInterval) {
                clearInterval(autoFireInterval);
                autoFireInterval = null;
            }
        });

        // Mouse leave canvas - stop auto-fire
        canvas.addEventListener('mouseleave', () => {
            isMouseDown = false;
            if (autoFireInterval) {
                clearInterval(autoFireInterval);
                autoFireInterval = null;
            }
        });

        // Track mouse position for auto-fire
        let lastMouseX = 0, lastMouseY = 0;
        canvas.addEventListener('mousemove', (e) => {
            lastMouseX = e.clientX;
            lastMouseY = e.clientY;
        });

        function sendChatMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            
            if (!message || !myId || ws.readyState !== WebSocket.OPEN) return;
            
            ws.send(JSON.stringify({type: 'chat', message: message}));
            input.value = '';
            canvas.focus();
            debug('✅ Message sent');
        }
        
        // Separate shooting function
        function shootBullet(e) {
            e?.preventDefault();

            if (e && e.preventDefault) e.preventDefault();
            if (e && e.stopPropagation) e.stopPropagation();

            if (!myId || ws.readyState !== WebSocket.OPEN) return;
            
            const now = Date.now();
            if (now - lastShotTime < SHOT_COOLDOWN) return;
            lastShotTime = now;
            
            const rect = canvas.getBoundingClientRect();
            const worldX = e.clientX - rect.left + cameraX;
            const worldY = e.clientY - rect.top + cameraY;
            
            const dx = worldX - myX;
            const dy = worldY - myY;
            const distance = Math.sqrt(dx*dx + dy*dy);
            
            if (distance < 10) return;
            
            const bullet = {
                id: Math.random().toString(36).substr(2, 9),
                x: myX,
                y: myY,
                vx: (dx / distance) * BULLET_SPEED,
                vy: (dy / distance) * BULLET_SPEED,
                owner: myId,
                createdAt: Date.now()
            };
            
            bullets.push(bullet);
            ws.send(JSON.stringify({type: 'shoot', bullet: bullet}));
        }
        function gameLoop() {
            const now = performance.now();
            const deltaTime = Math.min((now - lastTime) / 16.67, 2);
            lastTime = now;
            
            // Movement
            if (myId) {
                let moved = false;
                
                if (keys['w'] || keys['ArrowUp']) { myY -= SPEED; moved = true; }
                if (keys['s'] || keys['ArrowDown']) { myY += SPEED; moved = true; }
                if (keys['a'] || keys['ArrowLeft']) { myX -= SPEED; moved = true; }
                if (keys['d'] || keys['ArrowRight']) { myX += SPEED; moved = true; }

                myX = Math.max(20, Math.min(WORLD_WIDTH - 20, myX)); 
                myY = Math.max(20, Math.min(WORLD_HEIGHT - 20, myY));

                targetCameraX = myX - canvas.width / 2;
                targetCameraY = myY - canvas.height / 2;

                if (moved) {
                    ws.send(JSON.stringify({type: 'move', x: Math.round(myX), y: Math.round(myY)}));
                }
            }
            
            // Camera follow
            cameraX += (targetCameraX - cameraX) * CAMERA_SMOOTH;
            cameraY += (targetCameraY - cameraY) * CAMERA_SMOOTH;

            // Update bullets
            bullets = bullets.filter(b => {
                b.x += b.vx;
                b.y += b.vy;
                
                if (b.x < 0 || b.x > WORLD_WIDTH || b.y < 0 || b.y > WORLD_HEIGHT) return false;
                if (Date.now() - b.createdAt > 10000) return false;
                return true;
            });

            // Drawing
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.save();
            ctx.translate(-cameraX, -cameraY);

            // World border void
            ctx.fillStyle = VOID_COLOR;
            const visibleLeft = cameraX;
            const visibleTop = cameraY;
            const visibleRight = cameraX + canvas.width;
            const visibleBottom = cameraY + canvas.height;

            if (visibleLeft < 0) ctx.fillRect(visibleLeft, visibleTop, -visibleLeft, visibleBottom - visibleTop);
            if (visibleRight > WORLD_WIDTH) ctx.fillRect(WORLD_WIDTH, visibleTop, visibleRight - WORLD_WIDTH, visibleBottom - visibleTop);
            if (visibleTop < 0) ctx.fillRect(Math.max(0, visibleLeft), visibleTop, Math.min(WORLD_WIDTH, visibleRight) - Math.max(0, visibleLeft), -visibleTop);
            if (visibleBottom > WORLD_HEIGHT) ctx.fillRect(Math.max(0, visibleLeft), WORLD_HEIGHT, Math.min(WORLD_WIDTH, visibleRight) - Math.max(0, visibleLeft), visibleBottom - WORLD_HEIGHT);
            
            // Grid
            ctx.strokeStyle = GRID_COLOR;
            ctx.lineWidth = 1;
            const startX = Math.floor(cameraX / 50) * 50;
            const startY = Math.floor(cameraY / 50) * 50;
            
            for (let x = startX; x < cameraX + canvas.width + 50; x += 50) {
                ctx.beginPath();
                ctx.moveTo(x, cameraY);
                ctx.lineTo(x, cameraY + canvas.height);
                ctx.stroke();
            }
            
            for (let y = startY; y < cameraY + canvas.height + 50; y += 50) {
                ctx.beginPath();
                ctx.moveTo(cameraX, y);
                ctx.lineTo(cameraX + canvas.width, y);
                ctx.stroke();
            }
            
            // Other players
            for (let id in players) {
                const p = players[id];
                ctx.fillStyle = '#ff4444';
                ctx.beginPath();
                ctx.arc(p.x, p.y, 20, 0, Math.PI * 2);
                ctx.fill();
                
                // Center the text properly
                ctx.fillStyle = '#fff';
                ctx.font = '12px Arial';
                const text = `P${id}`;
                const textWidth = ctx.measureText(text).width;
                ctx.fillText(text, p.x - textWidth/2, p.y - 25);
            }
            
            // Yourself
            ctx.fillStyle = '#00ff00';
            ctx.beginPath();
            ctx.arc(myX, myY, 20, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#fff';
            ctx.font = '12px Arial';
            const youText = 'You';
            const youWidth = ctx.measureText(youText).width;
            ctx.fillText(youText, myX - youWidth/2, myY - 25);

            // Bullets
            ctx.fillStyle = '#ffff00';
            for (let b of bullets) {
                ctx.beginPath();
                ctx.arc(b.x, b.y, BULLET_SIZE, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.restore();

            // FPS counter
            frameCount++;
            if (now - lastFpsUpdate >= 1000) {
                document.getElementById('fps').innerHTML = `FPS: ${frameCount}`;
                frameCount = 0;
                lastFpsUpdate = now;
            }
            
            requestAnimationFrame(gameLoop);
        }
        
        gameLoop();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // Global debug access
        window.ws = ws;
        window.myId = myId;
        window.chatMessages = chatMessages;
        window.players = players;
    </script>
</body>
</html>
