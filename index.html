<!DOCTYPE html>
<html>
<head>
    <title>WAVE DEFENCE PROTOTYPE</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #1a1a2e;
            font-family: Arial, sans-serif;
        }
        #stats {
            position: fixed;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 5px;
            z-index: 100;
        }
        #debug {
            position: fixed;
            top: 10px;
            right: 10px;
            color: #0f0;
            background: rgba(0,0,0,0.8);
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
            z-index: 100;
            max-width: 300px;
            white-space: pre-wrap;
            display: none;
        }
        #fps {
            position: fixed;
            bottom: 10px;
            left: 10px;
            color: #0f0;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 14px;
            z-index: 100;
        }
        #gameCanvas {
            display: block;
        }
    </style>
</head>
<body>
    <div id="stats">Connecting...</div>
    <div id="debug">Debug console</div>
    <div id="fps">FPS: 0</div>
    
    <!-- Chat Container -->
    <div id="chatContainer" style="
        position: fixed;
        bottom: 10px;
        right: 10px;
        width: 300px;
        height: 200px;
        background: rgba(0,0,0,0.1);
        border: 1px solid #444;
        border-radius: 5px;
        display: flex;
        flex-direction: column;
        z-index: 1000;
    ">
        <div id="chatMessages" style="
            flex-grow: 1;
            overflow-y: auto;
            padding: 5px;
            color: white;
            font-family: monospace;
            font-size: 12px;
            display: flex;
            flex-direction: column-reverse;
        "></div>
        <div style="display: flex; border-top: 1px solid #444;">
            <input type="text" id="chatInput" placeholder="Type message..." style="
                flex-grow: 1;
                background: rgba(255,255,255,0.1);
                border: none;
                color: white;
                padding: 8px;
                outline: none;
                font-family: monospace;
            ">
            <button id="chatSend" style="
                background: #4CAF50;
                border: none;
                color: white;
                padding: 8px 15px;
                cursor: pointer;
                font-family: monospace;
            ">Send</button>
        </div>
    </div>
    
    <canvas id="gameCanvas"></canvas>

    <script>
        // Canvas setup
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        canvas.setAttribute('tabindex', '0');
        canvas.style.outline = 'none';
        canvas.focus();

        // Game state
        const ws = new WebSocket('wss://wave-defence-prototype.onrender.com');
        let players = {};
        let myId = null;
        let keys = {};
        let debugInfo = [];
        let lastPlayerCount = 0;
        let debugVisible = false;

        // Movement
        const SPEED = 2;
        let myX = 400, myY = 300;

        // Camera
        let cameraX = 0, cameraY = 0;
        let targetCameraX = 400, targetCameraY = 300;
        const CAMERA_SMOOTH = 0.1;
        let lastTime = performance.now();

        // World boundaries
        const WORLD_WIDTH = 2000;
        const WORLD_HEIGHT = 2000;
        const VOID_COLOR = 'rgba(30, 30, 40, 0.95)';
        const GRID_COLOR = '#2a2a3e';

        // Chat
        let chatMessages = [];
        const MAX_CHAT_MESSAGES = 50;

        // Bullet system
        const BULLET_SPEED = 300;               
        const BULLET_SIZE = 5;
        let bullets = [];
        let lastShotTime = 0;
        const SHOT_COOLDOWN = 500;             
        let isMouseDown = false;
        let autoFireInterval = null;
        const AUTO_FIRE_RATE = 500;           

        // Enemies
        let enemies = [];
        const ENEMY_SIZE = 18;
        const ENEMY_SPEED = 1.5;
        const ENEMY_HEALTH = 3;

        // Mouse screen position
        let mouseScreenX = 400, mouseScreenY = 300;

        // Server Update Variables
        let lastUpdateTime = 0;
        const UPDATE_RATE = 50;
        let lastSentAngle = 0;
        let lastSentX = 0, lastSentY = 0;
        let isConnected = false; // Track connection state

        // FPS counter
        let frameCount = 0;
        let lastFpsUpdate = performance.now();
        let fps = 0;

        function debug(...args) {
            const msg = args.join(' ');
            debugInfo.unshift(msg);
            if (debugInfo.length > 8) debugInfo.pop();
            document.getElementById('debug').innerHTML = debugInfo.join('<br>');
            console.log(...args);
        }

        ws.onopen = () => {
            debug('✅ Connected');
            document.getElementById('stats').innerHTML = '✅ Connected';
            ws.send(JSON.stringify({type: 'hello'}));
            isConnected = true;

            document.getElementById('chatSend').addEventListener('click', sendChatMessage);
            document.getElementById('chatInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendChatMessage();
            });
        };

        // Track mouse screen position
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseScreenX = e.clientX - rect.left;
            mouseScreenY = e.clientY - rect.top;
            lastMouseX = e.clientX;
            lastMouseY = e.clientY;
        });

        canvas.addEventListener('mousedown', () => {
            document.getElementById('chatInput').blur();
        });

        ws.onmessage = (event) => {
            console.log('🔵 RAW MESSAGE RECEIVED:', event.data);
            try {
                const data = JSON.parse(event.data);
                const chatDiv = document.getElementById('chatMessages');

                if (data.type === 'init') {
                    myId = data.id;
                    debug('✅ Got ID:', myId);
                    document.getElementById('stats').innerHTML = `Player ${myId}`;
                }

                if (data.type === 'update') {
                    enemies = data.enemies || [];
                    players = data.players || {};

                    const serverBullets = data.bullets || [];
                    bullets = bullets.filter(local => serverBullets.some(s => s.id === local.id));
                    for (let sb of serverBullets) {
                        if (!bullets.find(l => l.id === sb.id)) {
                            bullets.push(sb);
                        }
                    }

                    if (myId && players[myId]) {
                        document.getElementById('stats').innerHTML =
                            `P${myId} | ❤️ ${players[myId].health} | Enemies: ${enemies.length}`;
                    }

                    const currentCount = Object.keys(players).length;
                    if (currentCount !== lastPlayerCount) {
                        if (currentCount > lastPlayerCount) {
                            debug(`➕ Player joined! Total: ${currentCount}`);
                            chatMessages.unshift(`<span style="color: #4CAF50;">🏷️ Player joined! Total: ${currentCount}</span>`);
                        } else {
                            debug(`➖ Player left. Total: ${currentCount}`);
                            chatMessages.unshift(`<span style="color: #ff4444;">👋 Player left. Total: ${currentCount}</span>`);
                        }
                        if (chatMessages.length > MAX_CHAT_MESSAGES) chatMessages.pop();
                        chatDiv.innerHTML = chatMessages.map(msg => `<div style="margin:2px 0;">${msg}</div>`).join('');
                        lastPlayerCount = currentCount;
                    }
                }

                if (data.type === 'chat') {
                    console.log('📨 Chat received from player', data.playerId, ':', data.message);
                    const message = `[P${data.playerId}]: ${data.message}`;
                    chatMessages.unshift(message);
                    if (chatMessages.length > MAX_CHAT_MESSAGES) chatMessages.pop();
                    const chatDisplay = document.getElementById('chatMessages');
                    if (chatDisplay) {
                        chatDisplay.innerHTML = chatMessages.map(msg => `<div style="color:white; margin:2px 0;">${msg}</div>`).join('');
                    }
                }

            } catch (e) {
                debug('❌ Error:', e.message);
            }
        };
        
        ws.onclose = () => {
            debug('❌ Disconnected');
            document.getElementById('stats').innerHTML = '❌ Disconnected';
            isConnected = false;
        };

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (document.activeElement === document.getElementById('chatInput')) {
                if (e.key === 'ArrowUp' || e.key === 'ArrowDown') e.preventDefault();
                return;
            }
            keys[e.key] = true;
            if (['w','a','s','d','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
            if (e.key === 'e' || e.key === 'E') spawnTestEnemy();
            if (e.code === 'Backquote') {
                e.preventDefault();
                debugVisible = !debugVisible;
                document.getElementById('debug').style.display = debugVisible ? 'block' : 'none';
                if (debugVisible) debug('🔧 Debug mode ON');
            }
        });

        document.addEventListener('keyup', (e) => {
            if (document.activeElement === document.getElementById('chatInput')) return;
            keys[e.key] = false;
        });

        // Shooting
        canvas.addEventListener('mousedown', (e) => {
            e.preventDefault();
            e.stopPropagation();
            if (!myId || !isConnected) return;
            isMouseDown = true;
            shootBullet(e);
            if (autoFireInterval) clearInterval(autoFireInterval);
            autoFireInterval = setInterval(() => {
                if (isMouseDown && myId && isConnected) {
                    const fakeEvent = {
                        clientX: lastMouseX,
                        clientY: lastMouseY,
                        preventDefault: () => {}
                    };
                    shootBullet(fakeEvent);
                }
            }, AUTO_FIRE_RATE);
        });

        canvas.addEventListener('mouseup', () => {
            isMouseDown = false;
            if (autoFireInterval) {
                clearInterval(autoFireInterval);
                autoFireInterval = null;
            }
        });

        canvas.addEventListener('mouseleave', () => {
            isMouseDown = false;
            if (autoFireInterval) {
                clearInterval(autoFireInterval);
                autoFireInterval = null;
            }
        });

        let lastMouseX = 0, lastMouseY = 0;
        canvas.addEventListener('mousemove', (e) => {
            lastMouseX = e.clientX;
            lastMouseY = e.clientY;
        });

        function sendChatMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message || !myId || !isConnected) return;
            ws.send(JSON.stringify({type: 'chat', message}));
            input.value = '';
            canvas.focus();
            debug('✅ Message sent');
        }

        function shootBullet(e) {
            e?.preventDefault();
            if (e && e.preventDefault) e.preventDefault();
            if (e && e.stopPropagation) e.stopPropagation();
            if (!myId || !isConnected) return; 

            const now = Date.now();
            if (now - lastShotTime < SHOT_COOLDOWN) return;
            lastShotTime = now;

            const rect = canvas.getBoundingClientRect();
            const worldX = e.clientX - rect.left + cameraX;
            const worldY = e.clientY - rect.top + cameraY;

            const dx = worldX - myX;
            const dy = worldY - myY;
            const distance = Math.hypot(dx, dy);
            if (distance < 10) return;

            const bullet = {
                id: Math.random().toString(36).substr(2, 9),
                x: myX,
                y: myY,
                vx: (dx / distance) * BULLET_SPEED,
                vy: (dy / distance) * BULLET_SPEED,
                owner: myId,
                createdAt: Date.now()
            };

            bullets.push(bullet);
            ws.send(JSON.stringify({type: 'shoot', bullet}));
        }

        function spawnTestEnemy() {
            if (!myId || !isConnected) return; 
            const angle = Math.random() * Math.PI * 2;
            const distance = 200;
            const enemy = {
                id: Math.random().toString(36).substr(2, 9),
                x: myX + Math.cos(angle) * distance,
                y: myY + Math.sin(angle) * distance,
                health: ENEMY_HEALTH,
                size: ENEMY_SIZE
            };
            ws.send(JSON.stringify({type: 'spawn_enemy', enemy}));
            debug(`🧟 Spawned test enemy at (${Math.round(enemy.x)}, ${Math.round(enemy.y)})`);
        }
        
        function drawPlayer(x, y, color, isMe, angle, mouseX, mouseY) {
            ctx.save();
            ctx.translate(x, y);
            
            // Rotate the whole character
            ctx.rotate(angle + 1.57);
            
            // Body
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(0, 0, 20, 0, Math.PI * 2);
            ctx.fill();
            
            // Hands
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(-12, -8, 8, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(12, -8, 8, 0, Math.PI * 2);
            ctx.fill();
            
            // Eye whites
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(-5, -5, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(5, -5, 4, 0, Math.PI * 2);
            ctx.fill();
            
            // Direction to target 
            const dx = mouseX - x;
            const dy = mouseY - y;
            
            if (dx !== 0 || dy !== 0) {
                // Normalize world direction
                const worldLen = Math.hypot(dx, dy);
                const worldNormX = dx / worldLen;
                const worldNormY = dy / worldLen;
                
                // Transform world direction to character's local space
                const rotAngle = angle + 1.57;
                const cos = Math.cos(-rotAngle);
                const sin = Math.sin(-rotAngle);
                const localX = worldNormX * cos - worldNormY * sin;
                const localY = worldNormX * sin + worldNormY * cos;
                
                // Pupil offset (max 2.5 to stay inside eye)
                const pupilOffsetX = localX * 2.5;
                const pupilOffsetY = localY * 2.5;
                
                ctx.fillStyle = '#000000';
                ctx.beginPath();
                ctx.arc(-5 + pupilOffsetX, -5 + pupilOffsetY, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(5 + pupilOffsetX, -5 + pupilOffsetY, 2, 0, Math.PI * 2);
                ctx.fill();
            } else {
                ctx.fillStyle = '#000000';
                ctx.beginPath();
                ctx.arc(-5, -5, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(5, -5, 2, 0, Math.PI * 2);
                ctx.fill();
            }
            
            ctx.restore();
        }

        function gameLoop() {
            const nowPerf = performance.now();
            const deltaTime = (nowPerf - lastTime) / 1000;
            lastTime = nowPerf;
            ctx.imageSmoothingEnabled = false;

            // Clear canvas with background
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Calculate current mouse world position
            const mouseWorldX = mouseScreenX + cameraX;
            const mouseWorldY = mouseScreenY + cameraY;

            // Calculate angle to mouse
            let playerAngle = 0;
            const now = Date.now();

            if (myId) {
                const dxMouse = mouseWorldX - myX;
                const dyMouse = mouseWorldY - myY;
                if (Math.abs(dxMouse) > 0.1 || Math.abs(dyMouse) > 0.1) {
                    playerAngle = Math.atan2(dyMouse, dxMouse);
                }
            }

            // Movement
            if (myId) {
                if (keys['w'] || keys['ArrowUp']) { myY -= SPEED; }
                if (keys['s'] || keys['ArrowDown']) { myY += SPEED; }
                if (keys['a'] || keys['ArrowLeft']) { myX -= SPEED; }
                if (keys['d'] || keys['ArrowRight']) { myX += SPEED; }

                myX = Math.max(20, Math.min(WORLD_WIDTH - 20, myX));
                myY = Math.max(20, Math.min(WORLD_HEIGHT - 20, myY));

                targetCameraX = myX - canvas.width / 2;
                targetCameraY = myY - canvas.height / 2;
            }

            // Server update (periodic) - only if connected
            if (isConnected) {
                const timeToSend = now - lastUpdateTime > UPDATE_RATE;
                const positionChanged = Math.abs(myX - lastSentX) > 1 || Math.abs(myY - lastSentY) > 1;
                const angleChanged = Math.abs(playerAngle - lastSentAngle) > 0.05;

                if (timeToSend || positionChanged || angleChanged) {
                    lastUpdateTime = now;
                    lastSentX = myX;
                    lastSentY = myY;
                    lastSentAngle = playerAngle;

                    ws.send(JSON.stringify({
                        type: 'move',
                        x: Math.round(myX),
                        y: Math.round(myY),
                        angle: playerAngle
                    }));
                }
            }

            // Bullet movement
            bullets.forEach(b => {
                b.x += b.vx * deltaTime;
                b.y += b.vy * deltaTime;
            });
            bullets = bullets.filter(b => {
                if (b.x < 0 || b.x > WORLD_WIDTH || b.y < 0 || b.y > WORLD_HEIGHT) return false;
                if (Date.now() - b.createdAt > 10000) return false;
                return true;
            });

            // Camera follow
            cameraX += (targetCameraX - cameraX) * CAMERA_SMOOTH;
            cameraY += (targetCameraY - cameraY) * CAMERA_SMOOTH;

            // Drawing
            ctx.save();
            ctx.translate(-cameraX, -cameraY);

            // World border void
            ctx.fillStyle = VOID_COLOR;
            const visibleLeft = cameraX;
            const visibleTop = cameraY;
            const visibleRight = cameraX + canvas.width;
            const visibleBottom = cameraY + canvas.height;

            if (visibleLeft < 0) ctx.fillRect(visibleLeft, visibleTop, -visibleLeft, visibleBottom - visibleTop);
            if (visibleRight > WORLD_WIDTH) ctx.fillRect(WORLD_WIDTH, visibleTop, visibleRight - WORLD_WIDTH, visibleBottom - visibleTop);
            if (visibleTop < 0) ctx.fillRect(Math.max(0, visibleLeft), visibleTop, Math.min(WORLD_WIDTH, visibleRight) - Math.max(0, visibleLeft), -visibleTop);
            if (visibleBottom > WORLD_HEIGHT) ctx.fillRect(Math.max(0, visibleLeft), WORLD_HEIGHT, Math.min(WORLD_WIDTH, visibleRight) - Math.max(0, visibleLeft), visibleBottom - WORLD_HEIGHT);

            // Grid
            ctx.strokeStyle = GRID_COLOR;
            ctx.lineWidth = 1;
            const startX = Math.floor(Math.max(0, cameraX) / 50) * 50;
            const startY = Math.floor(Math.max(0, cameraY) / 50) * 50;
            const endX = Math.min(WORLD_WIDTH, cameraX + canvas.width);
            const endY = Math.min(WORLD_HEIGHT, cameraY + canvas.height);

            // Draw vertical grid lines
            for (let x = startX; x <= endX; x += 50) {
                ctx.beginPath();
                ctx.moveTo(x, Math.max(0, cameraY));
                ctx.lineTo(x, Math.min(WORLD_HEIGHT, cameraY + canvas.height));
                ctx.strokeStyle = GRID_COLOR;
                ctx.stroke();
            }

            // Draw horizontal grid lines
            for (let y = startY; y <= endY; y += 50) {
                ctx.beginPath();
                ctx.moveTo(Math.max(0, cameraX), y);
                ctx.lineTo(Math.min(WORLD_WIDTH, cameraX + canvas.width), y);
                ctx.stroke();
            }

            // Draw enemies
            for (let enemy of enemies) {
                ctx.fillStyle = '#8B0000';
                ctx.beginPath();
                ctx.arc(enemy.x, enemy.y, ENEMY_SIZE, 0, Math.PI * 2);
                ctx.fill();
                if (enemy.health < ENEMY_HEALTH) {
                    ctx.fillStyle = '#ff0000';
                    ctx.fillRect(enemy.x - 15, enemy.y - 30, 30, 4);
                    ctx.fillStyle = '#00ff00';
                    ctx.fillRect(enemy.x - 15, enemy.y - 30, 30 * (enemy.health / ENEMY_HEALTH), 4);
                }
            }

            // Draw bullets
            ctx.fillStyle = '#ffff00';
            for (let b of bullets) {
                ctx.beginPath();
                ctx.arc(b.x, b.y, BULLET_SIZE, 0, Math.PI * 2);
                ctx.fill();
            }

            // Draw other players with hands
            for (let id in players) {
                if (id === myId?.toString()) continue;
                const p = players[id];
                
                // Other players look at you
                drawPlayer(p.x, p.y, '#ff4444', false, p.angle || 0, myX || 0, myY || 0);

                // Health bar 
                ctx.fillStyle = '#ff0000';
                ctx.fillRect(p.x - 20, p.y - 30, 40, 5);
                ctx.fillStyle = '#00ff00';
                ctx.fillRect(p.x - 20, p.y - 30, 40 * (p.health / 100), 5);
                
                // Player ID
                ctx.fillStyle = '#fff';
                ctx.font = '12px Arial';
                const text = `P${id}`;
                const textWidth = ctx.measureText(text).width;
                ctx.fillText(text, p.x - textWidth/2, p.y - 40);
            }

            // Draw yourself with hands
            if (myId && players[myId]) {
                drawPlayer(myX, myY, '#00ff00', true, playerAngle, mouseWorldX, mouseWorldY);

                // Health bar
                ctx.fillStyle = '#ff0000';
                ctx.fillRect(myX - 20, myY - 30, 40, 5);
                ctx.fillStyle = '#00ff00';
                ctx.fillRect(myX - 20, myY - 30, 40 * (players[myId].health / 100), 5);

                // "You" label
                ctx.fillStyle = '#fff';
                ctx.font = '12px Arial';
                const youText = 'You';
                const youWidth = ctx.measureText(youText).width;
                ctx.fillText(youText, myX - youWidth / 2, myY - 40);
            }

            ctx.restore();

            // FPS counter
            frameCount++;
            if (nowPerf - lastFpsUpdate >= 1000) {
                document.getElementById('fps').innerHTML = `FPS: ${frameCount}`;
                frameCount = 0;
                lastFpsUpdate = nowPerf;
            }

            requestAnimationFrame(gameLoop);
        }

        gameLoop();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        window.ws = ws;
        window.myId = myId;
        window.chatMessages = chatMessages;
        window.players = players;
    </script>
</body>
</html>
